<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소임 배치표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<nav class="tabs">
  <button class="tab active" onclick="switchTab(0)" id="tab0">🗂 소임 기준 배치표</button>
  <button class="tab"        onclick="switchTab(1)" id="tab1">👤 인원 기준 배치표</button>
  <button class="tab"        onclick="switchTab(2)" id="tab2">📋 인원 등록</button>
</nav>

<!-- ════════════════════ DATE BAR ════════════════════ -->
<div class="date-bar">
  <span class="live-clock"><span class="live-clock-label">현재시간</span><span class="live-clock-time" id="liveClock"><span id="clockH">00</span><span class="live-clock-colon">:</span><span id="clockM">00</span></span></span>
  <button class="date-nav-btn" onclick="changeDate(-1)" title="이전 날짜">&#8249;</button>
  <button class="date-display" onclick="openDatePickerModal()" title="날짜 선택">
    <span class="date-display-text" id="dateDisplayText">—</span>
    <span class="date-display-day"  id="dateDisplayDay">—</span>
  </button>
  <button class="date-nav-btn" onclick="changeDate(+1)" title="다음 날짜">&#8250;</button>
  <input class="date-native" type="date" id="dateNative" onchange="onNativeDateChange(this.value)">
  <button class="date-today-btn" id="dateTodayBtn" onclick="goToday()">오늘</button>

  <!-- 시간 범위 (구분선) -->
  <div style="width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0"></div>
  <span class="time-range-label">표시 범위</span>
  <select class="time-range-select" id="viewStartH" onchange="onViewRangeChange()">
    <option value="0">0시</option><option value="1">1시</option><option value="2">2시</option>
    <option value="3">3시</option><option value="4">4시</option><option value="5">5시</option>
    <option value="6">6시</option><option value="7">7시</option><option value="8">8시</option>
    <option value="9">9시</option><option value="10">10시</option><option value="11">11시</option>
    <option value="12">12시</option><option value="13">13시</option><option value="14">14시</option>
    <option value="15">15시</option><option value="16">16시</option><option value="17">17시</option>
    <option value="18">18시</option><option value="19">19시</option><option value="20">20시</option>
    <option value="21">21시</option><option value="22">22시</option><option value="23">23시</option>
  </select>
  <span class="time-range-sep">—</span>
  <select class="time-range-select" id="viewEndH" onchange="onViewRangeChange()">
    <option value="1">1시</option><option value="2">2시</option><option value="3">3시</option>
    <option value="4">4시</option><option value="5">5시</option><option value="6">6시</option>
    <option value="7">7시</option><option value="8">8시</option><option value="9">9시</option>
    <option value="10">10시</option><option value="11">11시</option><option value="12">12시</option>
    <option value="13">13시</option><option value="14">14시</option><option value="15">15시</option>
    <option value="16">16시</option><option value="17">17시</option><option value="18">18시</option>
    <option value="19">19시</option><option value="20">20시</option><option value="21">21시</option>
    <option value="22">22시</option><option value="23">23시</option><option value="24">24시</option>
  </select>
  <button class="time-range-reset" onclick="resetViewRange()">전체</button>
</div>

<!-- ════════════════════ PAGE 0 : 소임 기준 배치표 ════════════════════ -->
<div class="page active" id="page0">

  <!-- ① 24H OVERVIEW -->
  <div class="overview-panel" id="overviewPanel">
    <div class="overview-hdr">
      <button class="ov-pin-btn" id="ovPinBtn" onclick="toggleOverviewPin()" title="Overview 상단 고정">📌</button>
      <span class="overview-hdr-title">24시간 배치 현황 Overview</span>
      <span class="ov-date-badge" id="ovDateBadge"></span>
      <div class="ov-legend" id="ovLegend"></div>
    </div>
    <div class="ov-track" id="ovTrack"></div>
    <div class="ov-ruler" id="ovRuler"></div>
  </div>

  <!-- ② TOOLBAR -->
  <div class="toolbar">
    <span class="toolbar-title">소임 목록</span>
    <div style="display:flex;gap:6px;align-items:center">
      <div class="undo-btn-wrap">
        <button class="btn btn-ghost" id="undoBtn" onclick="undo()" title="되돌리기 (Ctrl+Z)" disabled>↩ 되돌리기</button>
        <span class="undo-badge" id="undoBadge" style="display:none">0</span>
      </div>
      <div class="undo-btn-wrap">
        <button class="btn btn-ghost" id="redoBtn" onclick="redo()" title="다시 실행 (Ctrl+Y / Ctrl+Shift+Z)" disabled>↪ 다시실행</button>
        <span class="undo-badge" id="redoBadge" style="display:none;background:var(--blue);color:#000">0</span>
      </div>
    </div>
    <button class="btn btn-ghost" onclick="exportCSV()">⬇ CSV 내보내기</button>
    <label class="btn btn-ghost" style="cursor:pointer" title="CSV 파일을 업로드하여 소임/인원 데이터를 불러옵니다">
      ⬆ CSV 가져오기
      <input type="file" accept=".csv" style="display:none" onchange="importCSV(this)">
    </label>
    <button class="btn btn-ghost btn-toggle-personnel" id="togglePersonnelBtn" onclick="togglePersonnelView()" title="인원 이름 표시/숨기기">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="6" r="3"/>
        <path d="M1 1l12 12M5.5 5.5A3 3 0 0 0 9 9M2.5 3.5C1.5 4.5 1 6 1 6s2 4 6 4c.9 0 1.7-.2 2.4-.5M6 2.1C6.3 2 6.7 2 7 2c4 0 6 4 6 4s-.5 1.3-1.5 2.4"/></svg>
      인원 감추기
    </button>
    <button class="btn btn-primary" onclick="addDutyRow()" title="행 추가 (Ctrl+Enter, Shift+Enter)">＋ 행 추가</button>
  </div>

  <!-- ③ BULK TOOLBAR -->
  <div class="bulk-toolbar" id="bulkToolbar">
    <span class="bulk-label" id="bulkLabel">0행 선택됨</span>
    <div class="bulk-sep"></div>
    <div class="bulk-delta-wrap">
      <span class="bulk-delta-label">시작시간 변경</span>
      <input class="bulk-delta-input" id="bulkStartInput" type="text"
             placeholder="00:00" maxlength="5" style="width:72px"
             oninput="formatBulkTime(this)"
             onkeydown="if(event.key==='Enter')applyBulkShift()">
    </div>
    <button class="bulk-apply-btn" onclick="applyBulkShift()">▶ 적용</button>
    <div class="bulk-sep"></div>
    <div class="nudge-wrap">
      <span class="nudge-unit-label">시작</span>
      <span class="nudge-unit-label">±</span>
      <input class="nudge-unit-input" id="nudgeInput" type="number" value="10" min="1" max="720"
             title="이동할 분(分)">
      <span class="nudge-unit-label">분</span>
      <button class="nudge-btn nudge-btn-minus" onclick="applyNudge(-1)" title="선택 소임 시작시간 빼기">−</button>
      <button class="nudge-btn nudge-btn-plus"  onclick="applyNudge(+1)" title="선택 소임 시작시간 더하기">＋</button>
    </div>
    <div class="bulk-sep"></div>
    <div class="nudge-wrap">
      <span class="nudge-unit-label">소요</span>
      <span class="nudge-unit-label">±</span>
      <input class="nudge-unit-input" id="durNudgeInput" type="number" value="5" min="1" max="720"
             title="소요시간 조정 분(分)">
      <span class="nudge-unit-label">분</span>
      <button class="nudge-btn nudge-btn-minus" onclick="applyDurNudge(-1)" title="선택 소임 소요시간 빼기">−</button>
      <button class="nudge-btn nudge-btn-plus"  onclick="applyDurNudge(+1)" title="선택 소임 소요시간 더하기">＋</button>
    </div>
    <div class="bulk-sep"></div>
    <button class="bulk-apply-btn" style="background:var(--surface2);border-color:var(--blue);color:var(--blue);" onclick="openCopyModal()">📋 날짜 복사</button>
    <div class="bulk-sep"></div>
    <button class="bulk-apply-btn" style="background:rgba(248,81,73,.12);border-color:var(--red);color:var(--red);" onclick="bulkDelete()">🗑 선택 삭제</button>
    <div class="bulk-sep"></div>
    <button class="bulk-deselect-btn" onclick="clearSelection()">✕ 선택 해제</button>
  </div>

  <!-- ③ TABLE -->
  <div class="table-wrap">
    <table id="dutyTable" style="display:none">
      <thead><tr>
        <th class="th-cb"><input type="checkbox" class="row-select-cb" id="selectAllCb" title="전체 선택" onchange="toggleSelectAll(this)" onmousedown="this._wasIndeterminate = this.indeterminate"></th>
        <th style="width:28px"></th>
        <th style="width:36px;text-align:right">#</th>
        <th style="width:100px;text-align:center">시작 시간</th>
        <th style="width:100px;text-align:center">종료 시간</th>
        <th style="width:80px;text-align:center">소요(분)</th>
        <th style="width:200px">소임</th>
        <th style="width:68px;text-align:center">총 인원</th>
        <th class="th-personnel">인원 이름</th>
        <th style="width:72px"></th>
      </tr></thead>
      <tbody id="dutyBody"></tbody>
    </table>
    <div class="empty" id="dutyEmpty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">행 추가 버튼을 눌러 소임을 등록하세요.</div>
    </div>
  </div>
</div>

<!-- ════════════════════ PAGE 1 : 인원 기준 배치표 ════════════════════ -->
<div class="page" id="page1">
  <div id="ganttLegend" style="display:flex;flex-wrap:wrap;gap:8px;padding:10px 24px;border-bottom:1px solid var(--border2);min-height:40px;align-items:center">
    <span style="font-size:11px;color:var(--text-dim)">소임 범례</span>
  </div>
  <div style="padding-bottom:40px">
    <div id="ganttWrap" style="min-width:860px;padding-right:24px">
      <div style="display:flex;position:sticky;top:0;z-index:10;background:var(--bg)">
        <div class="gantt-name-col" style="display:flex;align-items:flex-end;padding-bottom:6px;border-bottom:1px solid var(--border)">
          <span style="font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.05em;text-transform:uppercase">인원</span>
        </div>
        <div id="timeRuler" style="flex:1;position:relative;height:56px;border-bottom:2px solid var(--border)"></div>
      </div>
      <div style="position:relative" id="ganttRowsWrap"><div id="ganttRows"></div><div id="ganttAllOverlay" style="position:absolute;top:0;left:140px;right:0;pointer-events:none;z-index:8"></div></div>
      <div class="empty" id="ganttEmpty">
        <div class="empty-icon">⏱</div>
        <div class="empty-text">소임 기준 배치표에서 인원을 배치하면 타임라인이 표시됩니다.</div>
      </div>
    </div>
  </div>
</div>

<!-- ════════════════════ PAGE 2 : 인원 등록 ════════════════════ -->
<div class="page" id="page2">
  <div class="personnel-wrap">
    <!-- 좌측 : 등록 폼 + 직책 관리 -->
    <div style="display:flex;flex-direction:column;gap:16px">

      <div class="panel">
        <div class="panel-header">✚ 인원 등록</div>
        <div class="panel-body">
          <div class="form-row">
            <div class="form-label">이름 *</div>
            <input class="input" id="pName" placeholder="홍길동" onkeydown="if(event.key==='Enter')addPersonnel()">
          </div>
          <div class="form-row">
            <div class="form-label">직책</div>
            <div class="tag-group" id="posGroup"></div>
          </div>
          <div class="form-row">
            <div class="form-label">특이사항</div>
            <input class="input" id="pNote" placeholder="메모 (선택 사항)">
          </div>
          <div style="margin-top:14px">
            <button class="btn btn-primary" style="width:100%;justify-content:center;height:38px" onclick="addPersonnel()">등록</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">🏷 직책 관리</div>
        <div class="panel-body">
          <div class="tag-group" id="posManageGroup" style="margin-bottom:10px"></div>
          <div class="add-pos-row">
            <input class="input" id="newPosInput" placeholder="새 직책 입력" style="flex:1" onkeydown="if(event.key==='Enter')addPosition()">
            <button class="btn btn-ghost btn-sm" onclick="addPosition()">＋ 추가</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 우측 : 등록된 인원 목록 -->
    <div class="panel">
      <div class="panel-header">📋 등록된 인원
        <span style="margin-left:auto;font-size:11px;color:var(--text-dim);font-weight:400">클릭하면 상세/편집</span>
      </div>
      <div id="personnelList"></div>
      <div class="p-count" id="pCount">총 0명</div>
    </div>
  </div>
</div>

<!-- ── 인원 상세 모달 ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-avatar" id="modalAvatar">?</div>
      <div style="flex:1;min-width:0">
        <div class="modal-name" id="modalName"></div>
        <div class="modal-sub"  id="modalSub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<!-- ── 날짜 복사 모달 ── -->
<div class="copy-modal-overlay" id="copyModalOverlay" onclick="closeCopyModal(event)">
  <div class="copy-modal">
    <div class="copy-modal-header">
      <span style="font-size:18px">📋</span>
      <span class="copy-modal-title">선택 소임 날짜 복사</span>
      <button class="copy-modal-close" onclick="closeCopyModal()">✕</button>
    </div>
    <div class="copy-modal-body">
      <div class="copy-modal-info" id="copyModalInfo">0개 소임을 복사합니다.</div>

      <div class="cal-wrap" id="copyCalWrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="calNav(-1)">&#8249;</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button class="cal-nav" onclick="calNav(+1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-ghost" id="copyTodayBtn" onclick="copyToToday()" title="오늘 날짜로 바로 복사">오늘 날짜로 복사</button>
        <div style="flex:1"></div>
        <button class="copy-confirm-btn" id="copyConfirmBtn" onclick="executeCopy()" disabled>
          복사하기
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ── 날짜 선택 달력 모달 ── -->
<div class="copy-modal-overlay" id="datePickerOverlay" onclick="closeDatePicker(event)">
  <div class="copy-modal">
    <div class="copy-modal-header">
      <span style="font-size:18px">📅</span>
      <span class="copy-modal-title">날짜 선택</span>
      <button class="copy-modal-close" onclick="closeDatePicker()">✕</button>
    </div>
    <div class="copy-modal-body">
      <div class="cal-wrap" id="datePickerCalWrap">
        <div class="cal-header">
          <button class="cal-nav" onclick="datePickerNav(-1)">&#8249;</button>
          <span class="cal-month-label" id="datePickerMonthLabel"></span>
          <button class="cal-nav" onclick="datePickerNav(+1)">&#8250;</button>
        </div>
        <div class="cal-grid" id="datePickerGrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── 특이사항 알림 패널 ── -->
<!-- FAB: 패널과 독립, 항상 화면에 표시 -->
<button class="alert-panel-toggle" id="alertFab" onclick="toggleAlertPanel()" title="특이사항 패널 열기">
  <span class="alert-toggle-icon" id="alertFabIcon">⚠</span>
  <span class="alert-toggle-badge hidden" id="alertBadge">0</span>
</button>

<!-- 패널 본체: collapsed시 완전히 화면 밖 -->
<div class="alert-panel collapsed" id="alertPanel">
  <div class="alert-panel-header">
    <span class="alert-panel-title">특이사항</span>
    <span class="alert-panel-count zero" id="alertCount">0건</span>
    <button onclick="toggleAlertPanel()" style="margin-left:auto;width:24px;height:24px;border-radius:4px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;" title="닫기">✕</button>
  </div>
  <div class="alert-panel-body" id="alertBody"></div>
  <div class="alert-panel-footer" id="alertFooter">인원 배치 충돌을 자동 감지합니다</div>
</div>

<script src="timeUtils.js"></script>
<script src="state.js"></script>
<script src="script.js"></script>
</body>
</html>
